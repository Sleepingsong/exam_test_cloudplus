<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CloudPlus Quiz Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <header class="topbar">
      <div>
        <p class="eyebrow">CompTIA Cloud+ Practice</p>
        <h1>CloudPlus Quiz</h1>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">Dark</button>
    </header>

    <main>
      <section id="startScreen" class="start-screen">
        <div class="logo-mark" aria-hidden="true">C+</div>
        <div class="start-copy">
          <p class="eyebrow">เลือกชุดข้อสอบ</p>
          <h2>เลือกชุดที่ต้องการฝึก แล้วเริ่มทำข้อสอบ</h2>
          <p>เลือกทำเป็นรายชุด หรือทำข้อสอบทั้งหมดรวมกัน ระบบจะตรวจคำตอบหลังจากกดยืนยัน และแสดงคำอธิบายของคำตอบทันที</p>
        </div>
        <form id="startForm" class="start-form">
          <div class="form-group">
            <label for="quizSelect">ชุดข้อสอบ:</label>
            <select id="quizSelect" class="form-control"></select>
          </div>
          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" id="shuffleQuestions" /> สุ่มลำดับคำถาม
            </label>
            <label>
              <input type="checkbox" id="shuffleChoices" /> สุ่มตัวเลือก
            </label>
          </div>
          <button type="submit" class="start-btn">เริ่มทำข้อสอบ</button>
        </form>
      </section>

      <section id="quizScreen" class="layout" hidden>
        <section class="quiz-panel" aria-live="polite">
          <div id="loading" class="notice">กำลังโหลดข้อสอบ...</div>
          <article id="questionView" class="question-view" hidden>
            <div class="question-meta">
              <span id="sourceLabel"></span>
              <span id="progressLabel"></span>
            </div>
            <h2 id="questionTitle"></h2>
            <p id="questionPrompt" class="prompt"></p>
            <div id="selectionHint" class="selection-hint"></div>
            <figure id="questionMedia" class="source-image" hidden></figure>
            <div id="choiceList" class="choices"></div>
            <div class="actions row">
              <button id="prevBtn" class="ghost" type="button">ก่อนหน้า</button>
              <button id="nextBtn" type="button">ข้อต่อไป</button>
            </div>
            <section id="resultBox" class="result" hidden></section>
          </article>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
